services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ideaseek_trading_studio}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-ideaseek_trading_studio}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INTERNAL_SERVICE_TOKEN: ${API_INTERNAL_SERVICE_TOKEN:-trading-studio-internal-token}
      INTELLIGENCE_BASE_URL: http://intelligence:8080
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"

  intelligence:
    build:
      context: ./services/intelligence
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: local
      API_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ideaseek_trading_studio}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      INTERNAL_SERVICE_TOKEN: ${INTELLIGENCE_INTERNAL_SERVICE_TOKEN:-trading-studio-internal-token}
      MARKET_PROVIDER: ${INTELLIGENCE_MARKET_PROVIDER:-akshare}
    depends_on:
      - mysql
      - redis
      - qdrant
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_APP_NAME: ${WEB_NUXT_PUBLIC_APP_NAME:-Trading Studio}
      NUXT_PUBLIC_API_BASE: ${WEB_NUXT_PUBLIC_API_BASE:-http://127.0.0.1:8000/api/v1}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  mysql-data:
